spring.application.name=acdsimulator

# ??? Server ??????????????????????????????????????????????????????????????????????????
server.port=8080
# Virtual threads mean you can raise this much higher than with platform threads
server.tomcat.threads.max=200
server.tomcat.accept-count=200

# ??? ACD Configuration ???????????????????????????????????????????????????????????????
# Number of simulated agents to register on startup
acd.agents.count=1000

# Max calls allowed in the priority queue before we return 503
acd.queue.capacity=10000

# How often (ms) the routing loop runs to dequeue and dispatch calls
acd.routing.delay-ms=50

# How many times a call can be re-queued (overflow) before being abandoned
acd.routing.overflow-max=3

# ??? Actuator (health + metrics endpoints) ???????????????????????????????????????????
# Expose health, metrics, and prometheus scrape endpoint
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always

# ??? Resilience4j ? Rate Limiter ?????????????????????????????????????????????????????
# Allow 5000 call ingestions per second before returning 429
resilience4j.ratelimiter.instances.callIngestion.limitForPeriod=5000
resilience4j.ratelimiter.instances.callIngestion.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.callIngestion.timeoutDuration=0

# ??? Resilience4j ? Circuit Breaker ??????????????????????????????????????????????????
# Open the circuit if 50% of last 10 routing attempts fail
resilience4j.circuitbreaker.instances.routingService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.routingService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.routingService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.routingService.permittedNumberOfCallsInHalfOpenState=3

# ??? Logging ?????????????????????????????????????????????????????????????????????????
# INFO for most things; DEBUG for ACD internals during development
logging.level.com.sprint.acdsimulator=INFO
# Uncomment for detailed routing logs:
# logging.level.com.sprint.acdsimulator.service=DEBUG

